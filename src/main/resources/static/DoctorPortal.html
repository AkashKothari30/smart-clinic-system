<!DOCTYPE html>
<html>
<head>
    <title>Doctor Portal</title>
    <style>
        body { font-family: Arial; background:#f0fff0; text-align:center; }
        .container { background:white; padding:20px; width:400px; margin:auto; margin-top:100px; box-shadow:0 0 10px gray; }
        table { width:100%; border-collapse: collapse; }
        th, td { border:1px solid black; padding:8px; }
        th { background:#007bff; color:white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Doctor Portal - Appointments</h2>

    <table>
        <tr>
            <th>Patient</th>
            <th>Date</th>
            <th>Time</th>
        </tr>

        <tr>
            <td>Rahul</td>
            <td>22-Apr-2026</td>
            <td>10:00 AM</td>
        </tr>

        <tr>
            <td>Amit</td>
            <td>22-Apr-2026</td>
            <td>11:30 AM</td>
        </tr>

    </table>
</div>

</body>
</html>
