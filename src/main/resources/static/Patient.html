<!DOCTYPE html>
<html>
<head>
    <title>Patient Portal</title>
    <style>
        body { font-family: Arial; background:#eef; text-align:center; }
        .container { background:white; padding:20px; width:350px; margin:auto; margin-top:100px; box-shadow:0 0 10px gray; }
        input, button { width:90%; padding:10px; margin:8px; }
        ul { text-align:left; }
    </style>
</head>
<body>

<div class="container">
    <h2>Patient Portal - Search Doctor</h2>
    <input type="text" placeholder="Search doctor by name">
    <button>Search</button>

    <h3>Results:</h3>
    <ul>
        <li>Dr. Sharma - Cardiologist</li>
        <li>Dr. Mehta - Dentist</li>
    </ul>
</div>

</body>
</html>
